services:
  postgres:
    image: postgres:16
    container_name: evolution_postgres
    restart: always
    environment:
      POSTGRES_DB: evolution_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"

  redis:
    image: redis:alpine
    container_name: redis_container
    restart: always
    ports:
      - "6379:6379"
    command: redis-server --requirepass "root1234" --appendonly yes

  evolution_api:
    image: evoapicloud/evolution-api:v2.3.7
    container_name: evolution_api_container
    depends_on:
      - postgres
      - redis
    restart: always
    ports:
      - "8080:8080"
    environment:
      SERVER_TYPE: http
      SERVER_PORT: 8080

      DATABASE_PROVIDER: postgresql
      DATABASE_CONNECTION_URI: postgresql://postgres:postgres@postgres:5432/evolution_db

      REDIS_ENABLED: "true"
      REDIS_URI: "redis://:root1234@redis:6379/0"

      CACHE_LOCAL_ENABLED: "false"
      CACHE_REDIS_ENABLED: "true"
      CACHE_REDIS_URI: "redis://:root1234@redis:6379/1"

      AUTHENTICATION_TYPE: apikey
      AUTHENTICATION_API_KEY: evolution-apikey-default

      WEBHOOK_GLOBAL_ENABLED: "true"
      BACK_WEBHOOK_GLOBAL_URL_: https://engine-service-1068521170727.us-central1.run.app/public/v1/whatsapp/webhook
      WEBHOOK_GLOBAL_URL: http://host.docker.internal:8078/public/v1/whatsapp/webhook
      WEBHOOK_BASE64: "true"

      WEBHOOK_EVENTS: "QRCODE_UPDATED,CONNECTION_UPDATE,MESSAGES_UPSERT,MESSAGES_UPDATE,CHATS_UPSERT,CONTACTS_UPSERT,PRESENCE_UPDATE"

      SYNC_FULL_HISTORY: "false"

    extra_hosts:
      - "host.docker.internal:host-gateway"